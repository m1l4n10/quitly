<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quitly">
<title>Quitly</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c; --border: #2a2a2a;
    --accent: #f97316; --green: #4ade80; --red: #f87171; --text: #f5f5f5;
    --text-dim: #6b6b6b; --radius: 18px; --radius-sm: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Syne', sans-serif; max-width:430px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; }
  
  #splash { position:fixed; inset:0; background:var(--bg); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; transition:0.5s; }
  #splash.hide { opacity:0; pointer-events:none; }
  .splash-logo { font-size:48px; font-weight:800; }
  .splash-logo span { color:var(--accent); }

  header { padding:20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--bg); z-index:10; }
  .logo { font-size:26px; font-weight:800; }
  .logo span { color:var(--accent); }
  .icon-btn { width:40px; height:40px; border-radius:12px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  
  nav { display:flex; gap:6px; padding:0 20px 16px; }
  .nav-btn { flex:1; padding:10px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-weight:600; cursor:pointer; font-family:'Syne', sans-serif; }
  .nav-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  main { flex:1; padding:0 20px 100px; overflow-y:auto; }
  .view { display:none; animation:fadeIn 0.2s ease; }
  .view.active { display:block; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)} }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:14px; }
  .card-title { font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; margin-bottom:16px; letter-spacing:0.1em; }

  .ring-wrap { position:relative; display:flex; justify-content:center; padding:10px; }
  .ring-svg { width:180px; height:180px; transform:rotate(-90deg); }
  .ring-track { fill:none; stroke:var(--surface2); stroke-width:12; }
  .ring-prog { fill:none; stroke:var(--accent); stroke-width:12; stroke-linecap:round; stroke-dasharray: 502; stroke-dashoffset: 502; transition: 1s; }
  .ring-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
  .ring-num { font-size:32px; font-weight:800; }
  .ring-unit { font-size:12px; color:var(--text-dim); font-family:'DM Mono', monospace; }

  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px; }
  .stat-label { font-size:10px; color:var(--text-dim); font-weight:700; text-transform:uppercase; margin-bottom:4px; }
  .stat-val { font-size:24px; font-weight:800; }
  .stat-val.red { color:var(--red); }
  .stat-val.orange { color:var(--accent); }

  .quit-btn { width:100%; padding:18px; border-radius:var(--radius); border:none; font-weight:700; font-size:16px; cursor:pointer; margin-bottom:10px; transition: 0.2s; font-family:'Syne', sans-serif; }
  .quit-btn.start { background:linear-gradient(135deg,#16a34a,#15803d); color:white; }
  .quit-btn.relapse { background:var(--surface2); border:1px solid var(--border); color:var(--red); }
  .action-btn { width:100%; padding:14px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface2); color:white; text-align:left; cursor:pointer; margin-bottom:8px; display:flex; align-items:center; gap:10px; font-family:'Syne', sans-serif; font-size:14px; }

  .milestone { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
  .milestone:last-child { border-bottom:none; }
  .milestone-icon { font-size:24px; width:30px; }
  .milestone-info { flex:1; }
  .milestone-name { font-size:14px; font-weight:600; }
  .milestone-desc { font-size:11px; color:var(--text-dim); font-family:'DM Mono', monospace; }
  .milestone-badge { font-size:10px; font-weight:700; padding:4px 8px; border-radius:12px; }
  .milestone-badge.done { background:rgba(74,222,128,0.2); color:var(--green); }
  .milestone-badge.todo { background:var(--surface2); color:var(--text-dim); }

  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day { aspect-ratio:1; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:12px; font-family:'DM Mono', monospace; }
  .cal-day.clean { background:rgba(74,222,128,0.2); color:var(--green); }
  .cal-day.relapse { background:rgba(248,113,113,0.2); color:var(--red); }
  .cal-day.today { outline:2px solid var(--accent); }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:0.2s; }
  .modal-overlay.show { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); width:100%; padding:24px; border-radius:20px 20px 0 0; transform:translateY(100%); transition:0.3s; }
  .modal-overlay.show .modal { transform:translateY(0); }
  .modal-input { width:100%; padding:12px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:10px; margin-bottom:15px; font-family:'DM Mono'; }
</style>
</head>
<body>

<div id="splash"><div class="splash-logo">Quit<span>ly</span></div></div>

<header>
  <div><div class="logo">Quit<span>ly</span></div><div id="headerDate" style="font-size:12px; color:var(--text-dim);"></div></div>
  <div class="icon-btn" onclick="switchView('stats', document.querySelector('nav button:last-child'))">⚙️</div>
</header>

<nav>
  <button class="nav-btn active" onclick="switchView('home',this)">Today</button>
  <button class="nav-btn" onclick="switchView('calendar',this)">Calendar</button>
  <button class="nav-btn" onclick="switchView('stats',this)">Stats</button>
</nav>

<main>
  <div class="view active" id="view-home">
    <div class="card">
      <div class="card-title">⏱ Time since last</div>
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 160 160">
          <circle class="ring-track" cx="80" cy="80" r="64"/>
          <circle class="ring-prog" id="ringProg" cx="80" cy="80" r="64"/>
        </svg>
        <div class="ring-center">
          <div class="ring-num" id="ringNum">—</div>
          <div class="ring-unit" id="ringUnit">ready</div>
        </div>
      </div>
      <div id="timerDetail" style="text-align:center; font-size:12px; color:var(--text-dim); font-family:'DM Mono'; margin-top:8px;"></div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Relapse Rate</div>
        <div class="stat-val red" id="homeRelRate">0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Current Streak</div>
        <div class="stat-val orange" id="homeStreak">0</div>
      </div>
    </div>

    <button class="quit-btn start" id="quitBtn" onclick="openStartModal()">Start Quitting</button>
    <button class="quit-btn relapse" id="relapseBtn" onclick="openRelapseModal()" style="display:none;">⚠️ Log Relapse</button>

    <div class="card">
      <div class="card-title">🏆 Milestones</div>
      <div id="milestoneList"></div>
    </div>
  </div>

  <div class="view" id="view-calendar">
    <div class="card">
      <div class="card-title" id="calTitle">Month</div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <div class="view" id="view-stats">
    <div class="card">
      <div class="card-title">💾 Backup & Import</div>
      <button class="action-btn" onclick="exportJSON()"><span>📤</span> Export as JSON</button>
      <button class="action-btn" onclick="document.getElementById('importFile').click()"><span>📥</span> Import (JSON)</button>
      <input type="file" id="importFile" style="display:none" accept=".json" onchange="importJSON(event)">
    </div>
    <div class="card">
      <button class="action-btn" style="color:var(--red)" onclick="confirmReset()"><span>🗑️</span> Delete all data</button>
    </div>
  </div>
</main>

<div class="modal-overlay" id="startModal" onclick="closeModal('startModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:15px">Choose Start Time</h3>
    <input type="datetime-local" id="startTimeInput" class="modal-input">
    <button class="quit-btn start" onclick="confirmStart()">Let's go!</button>
  </div>
</div>

<div class="modal-overlay" id="relapseModal" onclick="closeModal('relapseModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:10px">Confirm Relapse?</h3>
    <p style="font-size:13px; color:var(--text-dim); margin-bottom:20px">The timer will be reset to zero. Stay strong!</p>
    <button class="quit-btn start" style="background:var(--red)" onclick="confirmRelapse()">Confirm</button>
    <button class="quit-btn relapse" onclick="closeModal('relapseModal')">Cancel</button>
  </div>
</div>

<script>
let state = { startTime: null, relapses: [], days: {} };
let timerInterval = null;

function save() { localStorage.setItem('quitly_v2', JSON.stringify(state)); }
function load() {
  const data = localStorage.getItem('quitly_v2');
  if(data) state = JSON.parse(data);
}

window.onload = () => {
  load();
  setTimeout(() => document.getElementById('splash').classList.add('hide'), 800);
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', day:'numeric', month:'short'});
  updateUI();
  startTimer();
};

function updateUI() {
  const active = !!state.startTime;
  document.getElementById('relapseBtn').style.display = active ? 'block' : 'none';
  document.getElementById('quitBtn').textContent = active ? '🔄 Restart Timer' : 'Start Quitting';

  const streak = calcStreak();
  document.getElementById('homeStreak').textContent = streak + " d";
  
  const totalDays = Object.keys(state.days).length;
  const relDays = Object.values(state.days).filter(v => v === 'relapse').length;
  const rate = totalDays > 0 ? Math.round((relDays / totalDays) * 100) : 0;
  document.getElementById('homeRelRate').textContent = rate + "%";

  renderMilestones();
  renderCalendar();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  if (state.startTime) {
    timerInterval = setInterval(updateTimer, 1000);
    updateTimer();
  }
}

function updateTimer() {
  if (!state.startTime) return;
  const start = new Date(state.startTime);
  const now = new Date();
  const diff = now - start;
  
  if (diff < 0) { 
    document.getElementById('ringNum').textContent = '—'; 
    document.getElementById('ringUnit').textContent = 'ready';
    return; 
  }

  // Time calculations
  const d = Math.floor(diff / 86400000);
  const h = Math.floor(diff / 3600000) % 24;
  const m = Math.floor(diff / 60000) % 60;
  const s = Math.floor(diff / 1000) % 60;

  // Display logic
  if (d > 0) {
    document.getElementById('ringNum').textContent = d;
    document.getElementById('ringUnit').textContent = d === 1 ? "day" : "days";
  } else {
    const totalH = Math.floor(diff / 3600000);
    document.getElementById('ringNum').textContent = totalH;
    document.getElementById('ringUnit').textContent = totalH === 1 ? "hour" : "hours";
  }
  
  document.getElementById('timerDetail').textContent = `${h}h ${m}m ${s}s`;

  // Ring logic (24h cycle)
  const oneDayMs = 24 * 60 * 60 * 1000;
  const progress = (diff % oneDayMs) / oneDayMs; 
  
  // Progress based on stroke-dasharray: 502
  const offset = 502 * (1 - progress);
  document.getElementById('ringProg').style.strokeDashoffset = offset;
}

function calcStreak() {
  let streak = 0, d = new Date();
  while(true) {
    let k = d.toISOString().split('T')[0];
    if (state.days[k] === 'clean') { streak++; d.setDate(d.getDate()-1); }
    else if (k === new Date().toISOString().split('T')[0] && state.startTime) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function renderMilestones() {
  const mSteps = [
    { id: 1,  h: 1,      label: '1 Hour',      icon: '⏱️' },
    { id: 2,  h: 12,     label: '12 Hours',     icon: '🌓' },
    { id: 3,  h: 24,     label: '1 Day',        icon: '☀️' },
    { id: 4,  h: 168,    label: '1 Week',       icon: '🏆' },
    { id: 5,  h: 720,    label: '1 Month',      icon: '🌙' },
    { id: 6,  h: 2160,   label: '3 Months',     icon: '🎖️' },
    { id: 7,  h: 4380,   label: 'Half a Year',  icon: '🌟' },
    { id: 8,  h: 8760,   label: 'One Year',     icon: '👑' }
  ];

  const elapsedH = state.startTime ? (new Date() - new Date(state.startTime)) / 3600000 : 0;
  document.getElementById('milestoneList').innerHTML = mSteps.map(m => {
    const isDone = elapsedH >= m.h;
    let desc = isDone ? 'Completed' : 'Remaining: ' + Math.ceil(m.h - elapsedH) + 'h';
    return `
      <div class="milestone">
        <div class="milestone-icon">${m.icon}</div>
        <div class="milestone-info">
          <div class="milestone-name">${m.label}</div>
          <div class="milestone-desc">${desc}</div>
        </div>
        <div class="milestone-badge ${isDone ? 'done' : 'todo'}">${isDone ? '✓' : 'Pending'}</div>
      </div>`;
  }).join('');
}

function openStartModal() {
  let now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('startTimeInput').value = now.toISOString().slice(0,16);
  document.getElementById('startModal').classList.add('show');
}

function confirmStart() {
  state.startTime = new Date(document.getElementById('startTimeInput').value).toISOString();
  state.days[new Date().toISOString().split('T')[0]] = 'clean';
  save(); closeModal('startModal'); updateUI(); startTimer();
}

function openRelapseModal() { document.getElementById('relapseModal').classList.add('show'); }

function confirmRelapse() {
  state.relapses.push(new Date().toISOString());
  state.days[new Date().toISOString().split('T')[0]] = 'relapse';
  state.startTime = null;
  save(); closeModal('relapseModal'); updateUI(); startTimer();
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function switchView(viewId, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + viewId).classList.add('active');
  btn.classList.add('active');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'quitly_backup.json';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      state = JSON.parse(event.target.result);
      save();
      location.reload();
    } catch(err) { alert("Error importing file!"); }
  };
  reader.readAsText(file);
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  const now = new Date();
  document.getElementById('calTitle').textContent = now.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  let html = '';
  for(let i=1; i<=daysInMonth; i++) {
    let k = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    let cls = 'cal-day ' + (state.days[k] || '');
    if (i === now.getDate()) cls += ' today';
    html += `<div class="${cls}">${i}</div>`;
  }
  grid.innerHTML = html;
}

function confirmReset() { if(confirm("Are you sure you want to delete all data?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
